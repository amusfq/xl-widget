name: Build and Release DMG

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with v (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # Needed for creating a release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install create-dmg

      - name: Build and Package DMG
        run: |
          ./scripts/build_dmg.sh

      - name: Calculate SHA256
        run: |
          echo "SHA256=$(shasum -a 256 XLWidget.dmg | awk '{print $1}')" >> $GITHUB_ENV
          echo "Final SHA256: $(shasum -a 256 XLWidget.dmg | awk '{print $1}')"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: XLWidget.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
